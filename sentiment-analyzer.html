<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SentimentAI — Comment Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --accent: #7c6af7;
    --pos: #3dffa0;
    --pos-bg: rgba(61, 255, 160, 0.08);
    --neg: #ff4d6d;
    --neg-bg: rgba(255, 77, 109, 0.08);
    --neu: #ffd166;
    --neu-bg: rgba(255, 209, 102, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .logo-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, #a89cf5 60%, #7c6af7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.02em;
  }

  /* Input area */
  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    transition: border-color 0.3s;
  }

  .input-panel:focus-within {
    border-color: rgba(124,106,247,0.5);
    box-shadow: 0 0 0 4px rgba(124,106,247,0.06);
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    line-height: 1.7;
    resize: none;
    min-height: 130px;
    caret-color: var(--accent);
  }

  textarea::placeholder { color: var(--muted); }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .char-count {
    font-size: 12px;
    color: var(--muted);
  }

  .analyze-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .analyze-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }

  .analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,106,247,0.4); }
  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-icon { font-size: 16px; }

  /* Bulk mode */
  .mode-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    width: fit-content;
  }

  .tab-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(16px);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .result-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .result-card.positive { border-left: 3px solid var(--pos); }
  .result-card.negative { border-left: 3px solid var(--neg); }
  .result-card.neutral  { border-left: 3px solid var(--neu); }

  .result-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }

  .comment-preview {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    flex: 1;
    word-break: break-word;
  }

  .sentiment-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 999px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .sentiment-badge.positive { background: var(--pos-bg); color: var(--pos); border: 1px solid rgba(61,255,160,0.2); }
  .sentiment-badge.negative { background: var(--neg-bg); color: var(--neg); border: 1px solid rgba(255,77,109,0.2); }
  .sentiment-badge.neutral  { background: var(--neu-bg); color: var(--neu); border: 1px solid rgba(255,209,102,0.2); }

  .badge-emoji { font-size: 16px; }

  /* Score bars */
  .scores-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .score-item { display: flex; flex-direction: column; gap: 6px; }

  .score-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-bar {
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    border-radius: 999px;
    width: 0;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .score-fill.pos { background: var(--pos); }
  .score-fill.neg { background: var(--neg); }
  .score-fill.neu { background: var(--neu); }

  .score-value {
    font-size: 11px;
    color: var(--muted);
  }

  /* Reasoning */
  .reasoning {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  .reasoning-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 4px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stat-dot.pos { background: var(--pos); }
  .stat-dot.neg { background: var(--neg); }
  .stat-dot.neu { background: var(--neu); }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
  }

  .stat-label { color: var(--muted); }

  /* Loading */
  .loading-overlay {
    display: none;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    padding: 8px 0;
  }

  .loading-overlay.show { display: flex; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* History */
  .history-section { margin-top: 40px; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover { border-color: var(--neg); color: var(--neg); }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 40px;
    border: 1px dashed var(--border);
    border-radius: 16px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-badge">SentimentAI</div>
    <h1>Comment<br>Intelligence</h1>
    <p class="subtitle">Powered by Claude · Positive · Negative · Neutral</p>
  </header>

  <div class="mode-tabs">
    <button class="tab-btn active" onclick="setMode('single')">Single Comment</button>
    <button class="tab-btn" onclick="setMode('bulk')">Bulk Analysis</button>
  </div>

  <div class="input-panel">
    <span class="input-label" id="input-label">Enter a comment to analyze</span>
    <textarea id="comment-input" placeholder="Type or paste a comment here…" oninput="updateCount()"></textarea>
    <div class="input-footer">
      <span class="char-count" id="char-count">0 characters</span>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="loading-overlay" id="loading">
          <div class="spinner"></div>
          <span id="loading-text">Analyzing…</span>
        </div>
        <button class="analyze-btn" id="analyze-btn" onclick="analyze()">
          <span class="btn-icon">⚡</span> Analyze
        </button>
      </div>
    </div>
  </div>

  <div id="stats-container" style="display:none;">
    <div class="stats-bar" id="stats-bar"></div>
  </div>

  <div id="results-container"></div>

  <div class="history-section" id="history-section" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="section-title" style="flex:1;margin-bottom:0;">Analysis History</div>
      <button class="clear-btn" onclick="clearHistory()">Clear all</button>
    </div>
    <div id="history-list"></div>
  </div>

</div>

<script>
let mode = 'single';
let history = [];

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&m==='single')||(i===1&&m==='bulk')));
  const label = document.getElementById('input-label');
  const ta = document.getElementById('comment-input');
  if (m === 'bulk') {
    label.textContent = 'Enter multiple comments (one per line)';
    ta.placeholder = 'Comment 1\nComment 2\nComment 3…';
    ta.style.minHeight = '200px';
  } else {
    label.textContent = 'Enter a comment to analyze';
    ta.placeholder = 'Type or paste a comment here…';
    ta.style.minHeight = '130px';
  }
}

function updateCount() {
  const v = document.getElementById('comment-input').value;
  document.getElementById('char-count').textContent = `${v.length} character${v.length!==1?'s':''}`;
}

async function callClaude(prompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await response.json();
  return data.content[0].text;
}

async function analyze() {
  const input = document.getElementById('comment-input').value.trim();
  if (!input) return;

  const btn = document.getElementById('analyze-btn');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  loading.classList.add('show');

  const comments = mode === 'bulk'
    ? input.split('\n').map(l => l.trim()).filter(Boolean)
    : [input];

  const resultsContainer = document.getElementById('results-container');
  resultsContainer.innerHTML = '';

  let pos = 0, neg = 0, neu = 0;

  for (let i = 0; i < comments.length; i++) {
    const comment = comments[i];
    document.getElementById('loading-text').textContent = `Analyzing ${i+1} of ${comments.length}…`;

    try {
      const prompt = `Analyze the sentiment of this comment and respond ONLY with a JSON object (no markdown, no preamble):
{
  "sentiment": "positive" | "negative" | "neutral",
  "confidence": 0-100,
  "scores": { "positive": 0-100, "negative": 0-100, "neutral": 0-100 },
  "reasoning": "one concise sentence explaining the classification"
}

Comment: "${comment.replace(/"/g, '\\"')}"`;

      const raw = await callClaude(prompt);
      const clean = raw.replace(/```json|```/g, '').trim();
      const result = JSON.parse(clean);

      if (result.sentiment === 'positive') pos++;
      else if (result.sentiment === 'negative') neg++;
      else neu++;

      history.unshift({ comment, result, time: new Date().toLocaleTimeString() });

      renderCard(comment, result, resultsContainer);
    } catch (e) {
      console.error(e);
    }
  }

  // Stats
  if (comments.length > 1 || history.length > 1) {
    updateStats(pos, neg, neu);
  }

  btn.disabled = false;
  loading.classList.remove('show');
  renderHistory();
}

function renderCard(comment, result, container) {
  const card = document.createElement('div');
  card.className = `result-card ${result.sentiment}`;

  const emojis = { positive: '😊', negative: '😞', neutral: '😐' };
  const labels = { positive: 'Positive', negative: 'Negative', neutral: 'Neutral' };

  card.innerHTML = `
    <div class="result-header">
      <div class="comment-preview">${escHtml(comment)}</div>
      <div class="sentiment-badge ${result.sentiment}">
        <span class="badge-emoji">${emojis[result.sentiment]}</span>
        ${labels[result.sentiment]}
      </div>
    </div>
    <div class="scores-grid">
      <div class="score-item">
        <span class="score-label">Positive</span>
        <div class="score-bar"><div class="score-fill pos" data-val="${result.scores.positive}"></div></div>
        <span class="score-value">${result.scores.positive}%</span>
      </div>
      <div class="score-item">
        <span class="score-label">Negative</span>
        <div class="score-bar"><div class="score-fill neg" data-val="${result.scores.negative}"></div></div>
        <span class="score-value">${result.scores.negative}%</span>
      </div>
      <div class="score-item">
        <span class="score-label">Neutral</span>
        <div class="score-bar"><div class="score-fill neu" data-val="${result.scores.neutral}"></div></div>
        <span class="score-value">${result.scores.neutral}%</span>
      </div>
    </div>
    <div class="reasoning">
      <div class="reasoning-label">AI Reasoning</div>
      ${escHtml(result.reasoning)}
    </div>
  `;

  container.appendChild(card);

  // Animate in
  requestAnimationFrame(() => {
    card.classList.add('visible');
    card.querySelectorAll('.score-fill').forEach(el => {
      setTimeout(() => { el.style.width = el.dataset.val + '%'; }, 100);
    });
  });
}

function updateStats(p, n, ne) {
  const statsContainer = document.getElementById('stats-container');
  const statsBar = document.getElementById('stats-bar');
  statsContainer.style.display = 'block';
  const total = p + n + ne;
  statsBar.innerHTML = `
    <div class="stat-item"><div class="stat-dot pos"></div><span class="stat-num">${p}</span><span class="stat-label">Positive</span></div>
    <div class="stat-item"><div class="stat-dot neg"></div><span class="stat-num">${n}</span><span class="stat-label">Negative</span></div>
    <div class="stat-item"><div class="stat-dot neu"></div><span class="stat-num">${ne}</span><span class="stat-label">Neutral</span></div>
    <div class="stat-item" style="margin-left:auto;"><span class="stat-label">Total:</span> <span class="stat-num" style="font-size:14px;">${total}</span></div>
  `;
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  const recent = history.slice(0, 8);
  const emojis = { positive: '😊', negative: '😞', neutral: '😐' };

  list.innerHTML = recent.map(h => `
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:18px;">${emojis[h.result.sentiment]}</span>
      <span style="flex:1;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(h.comment)}</span>
      <span class="sentiment-badge ${h.result.sentiment}" style="padding:4px 10px;font-size:11px;">${h.result.sentiment}</span>
      <span style="font-size:10px;color:var(--muted);">${h.time}</span>
    </div>
  `).join('');
}

function clearHistory() {
  history = [];
  document.getElementById('history-section').style.display = 'none';
  document.getElementById('results-container').innerHTML = '';
  document.getElementById('stats-container').style.display = 'none';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Allow Enter to submit in single mode
document.getElementById('comment-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && mode === 'single') {
    e.preventDefault();
    analyze();
  }
});
</script>
</body>
</html>
